<!DOCTYPE html>
<html lang="{{LANG}}" dir="{{LANG_DIR}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{404.h1}} — TurfCalculator</title>
  <meta name="robots" content="noindex, follow">
  <link rel="canonical" href="https://turfonlinecalculator.com/{{LANG}}/{{SLUG}}">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body class="has-bottom-nav">

  {{HEADER}}

  <main id="main" class="tool-page" style="text-align:center;padding-block:var(--space-12)">
    <article>
      <h1>{{404.h1}}</h1>
      <p style="font-size:1.125rem;margin-block:var(--space-4)">{{404.message}}</p>

      <div class="tool-grid" style="max-width:480px;margin-inline:auto;margin-block:var(--space-8)">
        <a href="/{{LANG}}/{{pages.sod-calculator}}" class="tool-card">
          <span class="tool-card__icon">🌱</span>
          <span class="tool-card__title">{{nav.sod_calculator}}</span>
        </a>
        <a href="/{{LANG}}/{{pages.lawn-area-calculator}}" class="tool-card">
          <span class="tool-card__icon">📐</span>
          <span class="tool-card__title">{{nav.lawn_area_calculator}}</span>
        </a>
        <a href="/{{LANG}}/{{pages.grass-seed-calculator}}" class="tool-card">
          <span class="tool-card__icon">🌾</span>
          <span class="tool-card__title">{{nav.grass_seed_calculator}}</span>
        </a>
        <a href="/{{LANG}}/{{pages.fertilizer-calculator}}" class="tool-card">
          <span class="tool-card__icon">💧</span>
          <span class="tool-card__title">{{nav.fertilizer_calculator}}</span>
        </a>
        <a href="/{{LANG}}/{{pages.area-converter}}" class="tool-card">
          <span class="tool-card__icon">📏</span>
          <span class="tool-card__title">{{nav.area_converter}}</span>
        </a>
      </div>

      <a href="/{{LANG}}/" class="btn btn--primary" style="margin-block:var(--space-6)">{{404.go_home}}</a>
    </article>
  </main>

  {{FOOTER}}

  <script src="/js/app.js"></script>
</body>
</html>
